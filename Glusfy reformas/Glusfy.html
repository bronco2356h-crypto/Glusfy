<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glusfy — Reformas de baños y cocinas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: #0A0E1A; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E2E8F4; border-radius: 4px; }
    .fade-enter { animation: fadeIn 0.35s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    button { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="glusfy-landing.jsx"></script>
  <script type="text/babel" src="glusfy-configurator.jsx"></script>
  <script type="text/babel" src="glusfy-screens.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#1B4FD8",
      "heroStyle": "azul",
      "fontHeading": "Playfair Display",
      "mobileWidth": 390,
      "showDesktop": true
    }/*EDITMODE-END*/;

    const { TweaksPanel, TweakSection, TweakColor, TweakRadio, TweakToggle, TweakSlider, useTweaks } = window;

    // ── Mobile Phone Shell ──────────────────────────────────────────
    const PhoneShell = ({ children, width }) => (
      <div style={{
        width: width, height: Math.round(width * 2.16),
        maxHeight: '88vh',
        borderRadius: 44, overflow: 'hidden',
        boxShadow: '0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1)',
        background: 'white', position: 'relative', flexShrink: 0,
        display: 'flex', flexDirection: 'column'
      }}>
        {/* Status bar */}
        <div style={{ height: 44, background: 'white', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 24px', flexShrink: 0, borderBottom: '1px solid #F0ECEB' }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: '#1A1714', fontFamily: "'DM Sans',sans-serif" }}>9:41</span>
          <div style={{ width: 110, height: 28, background: '#1A1714', borderRadius: 20, position: 'absolute', left: '50%', top: 8, transform: 'translateX(-50%)' }}/>
          <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1A1714"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#1A1714"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#1A1714"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="#1A1714" opacity="0.3"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 3.5C10.5 3.5 12.7 4.6 14.2 6.3L15.5 5C13.6 3 11 1.8 8 1.8S2.4 3 0.5 5l1.3 1.3C3.3 4.6 5.5 3.5 8 3.5z" fill="#1A1714"/><path d="M8 6.5c1.4 0 2.7.6 3.6 1.5L13 6.6C11.7 5.4 10 4.7 8 4.7S4.3 5.4 3 6.6l1.4 1.4C5.3 7.1 6.6 6.5 8 6.5z" fill="#1A1714"/><circle cx="8" cy="10" r="1.5" fill="#1A1714"/></svg>
            <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="3.5" stroke="#1A1714" strokeOpacity="0.35"/><rect x="1.5" y="1.5" width="18" height="9" rx="2.5" fill="#1A1714"/><path d="M23.5 4.5v3a1.5 1.5 0 000-3z" fill="#1A1714" opacity="0.4"/></svg>
          </div>
        </div>
        <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          {children}
        </div>
      </div>
    );

    // ── View label pill ──────────────────────────────────────────────
    const ViewPill = ({ label, active, onClick }) => (
      <button onClick={onClick} style={{
        background: active ? 'white' : 'transparent',
        border: 'none', borderRadius: 20,
        padding: '6px 16px', fontSize: 13, fontWeight: 600,
        color: active ? '#1A1714' : 'rgba(255,255,255,0.5)',
        cursor: 'pointer', fontFamily: "'DM Sans', sans-serif",
        transition: 'all 0.2s', boxShadow: active ? '0 2px 8px rgba(0,0,0,0.15)' : 'none'
      }}>{label}</button>
    );

    // ── Main App ─────────────────────────────────────────────────────
    const App = () => {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [screen, setScreen] = React.useState('landing');
      const [view, setView] = React.useState('desktop'); // 'desktop' | 'mobile'
      const [prevScreen, setPrevScreen] = React.useState(null);
      const [animKey, setAnimKey] = React.useState(0);

      const navigate = (to) => {
        setPrevScreen(screen);
        setScreen(to);
        setAnimKey(k => k + 1);
        if (to !== 'landing') setView('mobile');
        else setView('desktop');
      };

      const isMobileScreen = screen !== 'landing';
      const phoneW = Math.min(tweaks.mobileWidth, 430);

      // inject accent color CSS var
      React.useEffect(() => {
        document.documentElement.style.setProperty('--accent', tweaks.accentColor);
      }, [tweaks.accentColor]);

      const mobileContent = (
        <div key={animKey} className="fade-enter" style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          {screen === 'configurator' && (
            <GlusfyConfigurator
              onComplete={() => navigate('confirm')}
              onBack={() => navigate('landing')}
            />
          )}
          {screen === 'catalog' && (
            <GlusfyCatalog
              onStartConfigurator={() => navigate('configurator')}
              onBack={() => navigate('landing')}
            />
          )}
          {screen === 'confirm' && (
            <GlusfyConfirmation onHome={() => navigate('landing')} />
          )}
        </div>
      );

      return (
        <div style={{ minHeight: '100vh', background: '#1A1714', display: 'flex', flexDirection: 'column' }}>

          {/* Top view switcher */}
          <div style={{
            position: 'fixed', top: 16, left: '50%', transform: 'translateX(-50%)',
            background: 'rgba(255,255,255,0.08)', borderRadius: 24, padding: 4,
            display: 'flex', gap: 2, zIndex: 200, backdropFilter: 'blur(12px)',
            border: '1px solid rgba(255,255,255,0.1)'
          }}>
            <ViewPill label="🖥 Landing" active={view === 'desktop'} onClick={() => { setView('desktop'); navigate('landing'); }}/>
            <ViewPill label="📱 Configurador" active={view === 'mobile' && screen === 'configurator'} onClick={() => { setView('mobile'); navigate('configurator'); }}/>
            <ViewPill label="📋 Catálogo" active={view === 'mobile' && screen === 'catalog'} onClick={() => { setView('mobile'); navigate('catalog'); }}/>
            <ViewPill label="✅ Confirmación" active={view === 'mobile' && screen === 'confirm'} onClick={() => { setView('mobile'); navigate('confirm'); }}/>
          </div>

          {/* DESKTOP LANDING */}
          {view === 'desktop' && (
            <div key={animKey} className="fade-enter" style={{ flex: 1 }}>
              <GlusfyLanding
                onStartConfigurator={() => navigate('configurator')}
                onCatalog={() => navigate('catalog')}
              />
            </div>
          )}

          {/* MOBILE VIEWS */}
          {view === 'mobile' && (
            <div style={{
              flex: 1, display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center',
              padding: '80px 24px 40px', gap: 24, minHeight: '100vh'
            }}>
              {/* Screen label */}
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: 2, color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', marginBottom: 6 }}>
                  {screen === 'configurator' ? 'Configurador' : screen === 'catalog' ? 'Catálogo de productos' : 'Confirmación de pago'}
                </div>
                <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.25)' }}>390 × 844px — iPhone 14</div>
              </div>

              <PhoneShell width={phoneW}>
                {mobileContent}
              </PhoneShell>

              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.25)', lineHeight: 1.6 }}>
                  Interactivo — navega por todos los pasos del configurador
                </div>
              </div>
            </div>
          )}

          <TweaksPanel tweaks={tweaks} setTweak={setTweak}>
            <TweakSection title="Color de acento">
              <TweakColor id="accentColor" label="Terracota" tweaks={tweaks} setTweak={setTweak}/>
            </TweakSection>
            <TweakSection title="Vista hero">
              <TweakRadio id="heroStyle" label="Estilo" options={['terracota', 'oscuro', 'crema']} tweaks={tweaks} setTweak={setTweak}/>
            </TweakSection>
            <TweakSection title="Dispositivo móvil">
              <TweakSlider id="mobileWidth" label="Ancho" min={320} max={430} step={10} tweaks={tweaks} setTweak={setTweak}/>
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
